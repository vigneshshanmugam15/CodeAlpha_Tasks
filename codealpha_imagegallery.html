<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lens Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --text: #f4f4f5;
      --muted: #71717a;
      --accent: #a78bfa;
      --accent-dim: rgba(167, 139, 250, 0.15);
      --border: #27272a;
      --radius: 12px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    header {
      text-align: center;
      padding: 3rem 1.5rem 2rem;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--muted);
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      max-width: 520px;
      margin: 0 auto 2rem;
    }

    /* Category filters */
    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      padding: 0 1rem;
    }

    .filter-btn {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0b;
      font-weight: 600;
    }

    /* CSS image filter toggle */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding: 0 1rem;
    }

    .filter-bar label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .filter-bar select {
      padding: 0.45rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color var(--transition);
    }

    .filter-bar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Gallery grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      padding: 2rem clamp(1rem, 4vw, 3rem) 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-item {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 4 / 3;
      opacity: 1;
      transform: scale(1);
      transition:
        opacity var(--transition),
        transform var(--transition),
        filter var(--transition);
    }

    .gallery-item.hidden {
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
      position: absolute;
      visibility: hidden;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), filter var(--transition);
    }

    /* Hover overlay */
    .gallery-item::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 55%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .gallery-item:hover::after { opacity: 1; }

    .gallery-item:hover img {
      transform: scale(1.08);
    }

    .item-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem;
      z-index: 1;
      transform: translateY(12px);
      opacity: 0;
      transition: opacity var(--transition), transform var(--transition);
    }

    .gallery-item:hover .item-info {
      opacity: 1;
      transform: translateY(0);
    }

    .item-info h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .item-info span {
      font-size: 0.8rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .zoom-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition), transform var(--transition);
      z-index: 2;
      pointer-events: none;
    }

    .zoom-icon svg {
      width: 24px;
      height: 24px;
      stroke: white;
      fill: none;
      stroke-width: 2;
    }

    .gallery-item:hover .zoom-icon {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* CSS filter classes applied to gallery */
    .gallery.filter-grayscale img { filter: grayscale(100%); }
    .gallery.filter-sepia img     { filter: sepia(80%); }
    .gallery.filter-vivid img      { filter: saturate(1.6) contrast(1.1); }
    .gallery.filter-cool img       { filter: hue-rotate(200deg) saturate(0.9); }
    .gallery.filter-warm img       { filter: sepia(30%) saturate(1.3) hue-rotate(-10deg); }

    .gallery.filter-grayscale .gallery-item:hover img,
    .gallery.filter-sepia .gallery-item:hover img,
    .gallery.filter-vivid .gallery-item:hover img,
    .gallery.filter-cool .gallery-item:hover img,
    .gallery.filter-warm .gallery-item:hover img {
      filter: none;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition), visibility var(--transition);
      padding: 1rem;
    }

    .lightbox.open {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      transform: scale(0.9);
      transition: transform var(--transition);
    }

    .lightbox.open .lightbox-content {
      transform: scale(1);
    }

    .lightbox-content img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
      display: block;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      transition: filter var(--transition);
    }

    .lightbox-caption {
      text-align: center;
      margin-top: 1rem;
    }

    .lightbox-caption h3 { font-size: 1.1rem; margin-bottom: 0.25rem; }
    .lightbox-caption span { color: var(--accent); font-size: 0.85rem; }
    .lightbox-counter {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.35rem;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), transform 0.2s;
      z-index: 10;
    }

    .lb-btn:hover { background: rgba(255,255,255,0.22); }
    .lb-btn:active { transform: translateY(-50%) scale(0.92); }

    .lb-prev { left: clamp(0.5rem, 3vw, 2rem); }
    .lb-next { right: clamp(0.5rem, 3vw, 2rem); }

    .lb-close {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: background var(--transition);
      z-index: 1001;
      line-height: 1;
    }

    .lb-close:hover { background: rgba(255,255,255,0.25); }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      display: none;
    }

    .empty-state.show { display: block; }

    /* Responsive */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.75rem;
        padding: 1.5rem 1rem 3rem;
      }

      .gallery-item { aspect-ratio: 1; border-radius: 8px; }

      .item-info { padding: 0.75rem; }
      .item-info h3 { font-size: 0.85rem; }

      .lb-btn { width: 40px; height: 40px; font-size: 1.2rem; }
    }

    @media (min-width: 1200px) {
      .gallery {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <h1>Image Gallery</h1>
    <p>Explore curated photography. Filter by category, apply visual styles, and tap any image to view full size.</p>

    <div class="filters" id="categoryFilters">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="nature">Nature</button>
      <button class="filter-btn" data-category="architecture">Architecture</button>
      <button class="filter-btn" data-category="travel">Travel</button>
      <button class="filter-btn" data-category="portrait">Portrait</button>
    </div>

    <div class="filter-bar">
      <label for="cssFilter">Visual filter:</label>
      <select id="cssFilter">
        <option value="">None</option>
        <option value="filter-grayscale">Grayscale</option>
        <option value="filter-sepia">Sepia</option>
        <option value="filter-vivid">Vivid</option>
        <option value="filter-cool">Cool tone</option>
        <option value="filter-warm">Warm tone</option>
      </select>
    </div>
  </header>

  <main class="gallery" id="gallery"></main>

  <p class="empty-state" id="emptyState">No images in this category.</p>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
    <button class="lb-btn lb-next" id="lbNext" aria-label="Next">&#8250;</button>
    <div class="lightbox-content">
      <img id="lbImage" src="" alt="">
      <div class="lightbox-caption">
        <h3 id="lbTitle"></h3>
        <span id="lbCategory"></span>
        <p class="lightbox-counter" id="lbCounter"></p>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 Image Gallery</footer>

  <script>
    const images = [
      { src: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80", title: "Mountain Peaks", category: "nature" },
      { src: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80", title: "Forest Path", category: "nature" },
      { src: "https://t3.ftcdn.net/jpg/09/74/49/06/360_F_974490680_gW9n2UQTJqjAlfCNMcEFJXI96gVmzmhF.jpg", title: "Morning Dew", category: "nature" },
      { src: "https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=800&q=80", title: "City Skyline", category: "architecture" },
      { src: "https://images.unsplash.com/photo-1514565131-fce0801e5785?w=800&q=80", title: "Urban Bridge", category: "architecture" },
      { src: "https://w0.peakpx.com/wallpaper/773/734/HD-wallpaper-cities-city-skyscraper-building-dubai-cityscape-united-arab-emirates-burj-khalifa-thumbnail.jpg", title: "Modern Tower", category: "architecture" },
      { src: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdiGeOswmO7xMLVCk-dZbs6ztxAL-JTLW2otSXTBsRo9RdKDpvyPY3Tec&s=10", title: "Lake Retreat", category: "travel" },
      { src: "https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800&q=80", title: "Coastal Road", category: "travel" },
      { src: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800&q=80", title: "Sunset Valley", category: "travel" },
      { src: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=800&q=80", title: "Studio Portrait", category: "portrait" },
      { src: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80", title: "Natural Light", category: "portrait" },
      { src: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800&q=80", title: "Golden Hour", category: "portrait" },
    ];

    let activeCategory = "all";
    let visibleImages = [...images];
    let currentIndex = 0;

    const galleryEl   = document.getElementById("gallery");
    const lightbox    = document.getElementById("lightbox");
    const lbImage     = document.getElementById("lbImage");
    const lbTitle     = document.getElementById("lbTitle");
    const lbCategory  = document.getElementById("lbCategory");
    const lbCounter   = document.getElementById("lbCounter");
    const emptyState  = document.getElementById("emptyState");

    function renderGallery() {
      galleryEl.innerHTML = "";
      visibleImages = activeCategory === "all"
        ? images
        : images.filter(img => img.category === activeCategory);

      emptyState.classList.toggle("show", visibleImages.length === 0);

      visibleImages.forEach((img, i) => {
        const item = document.createElement("div");
        item.className = "gallery-item";
        item.dataset.index = i;
        item.innerHTML = `
          <img src="${img.src}" alt="${img.title}" loading="lazy">
          <div class="item-info">
            <span>${img.category}</span>
            <h3>${img.title}</h3>
          </div>
          <div class="zoom-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </div>`;
        item.addEventListener("click", () => openLightbox(i));
        galleryEl.appendChild(item);
      });
    }

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    }

    function updateLightbox() {
      const img = visibleImages[currentIndex];
      lbImage.src = img.src;
      lbImage.alt = img.title;
      lbTitle.textContent = img.title;
      lbCategory.textContent = img.category;
      lbCounter.textContent = `${currentIndex + 1} / ${visibleImages.length}`;
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % visibleImages.length;
      updateLightbox();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + visibleImages.length) % visibleImages.length;
      updateLightbox();
    }

    // Category filters
    document.getElementById("categoryFilters").addEventListener("click", e => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeCategory = btn.dataset.category;
      renderGallery();
    });

    // CSS visual filters
    document.getElementById("cssFilter").addEventListener("change", e => {
      galleryEl.className = "gallery";
      if (e.target.value) galleryEl.classList.add(e.target.value);
    });

    // Lightbox controls
    document.getElementById("lbClose").addEventListener("click", closeLightbox);
    document.getElementById("lbNext").addEventListener("click", nextImage);
    document.getElementById("lbPrev").addEventListener("click", prevImage);

    lightbox.addEventListener("click", e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", e => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") nextImage();
      if (e.key === "ArrowLeft") prevImage();
    });

    // Touch swipe in lightbox
    let touchStartX = 0;
    lightbox.addEventListener("touchstart", e => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    lightbox.addEventListener("touchend", e => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) diff > 0 ? prevImage() : nextImage();
    }, { passive: true });

    renderGallery();
  </script>
</body>
</html>
